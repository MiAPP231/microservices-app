version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - user-service
      - order-service
    networks:
      - microservices-net
    restart: unless-stopped

  user-service:
    build: ./user-service
    expose:
      - "5000"
    networks:
      - microservices-net
    restart: unless-stopped

  order-service:
    build: ./order-service
    expose:
      - "3000"
    networks:
      - microservices-net
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge